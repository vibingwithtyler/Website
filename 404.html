<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Vibing with Code</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050506;
            --bg-card: #14141e;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ededef;
            --text-secondary: #8a8f98;
            --text-muted: #555963;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 58, 237, 0.15);
            --teal: #4ec9b0;
            --rose: #f43f5e;
            --radius: 16px;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .ambient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.07;
            animation: float 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: var(--accent);
            top: -200px;
            right: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--teal);
            bottom: -150px;
            left: -100px;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: var(--rose);
            top: 40%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        .error-container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            animation: fadeIn 0.8s var(--ease-out) both;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 12px;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--text-primary);
            margin-bottom: 14px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.25s var(--ease-out);
        }

        a:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        a:focus-visible {
            outline: 2px solid var(--accent-light);
            outline-offset: 2px;
        }

        a svg {
            width: 16px;
            height: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .ambient .blob { animation: none; }
        }

        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="ambient" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>Looks like this page doesn't exist. It may have been moved, or maybe you mistyped the URL.</p>
        <a href="/index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            Back to Home
        </a>
    </div>
</body>
</html>
