<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80" />
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100" />
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" mode="multiply" result="blend" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal" />
    </filter>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4ec9b0" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ededef" />
      <stop offset="100%" stop-color="#c4c4c8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050506" />

  <!-- Ambient blobs -->
  <circle cx="200" cy="500" r="280" fill="#7c3aed" opacity="0.12" filter="url(#blur1)" />
  <circle cx="950" cy="150" r="240" fill="#4ec9b0" opacity="0.08" filter="url(#blur2)" />
  <circle cx="1050" cy="520" r="200" fill="#f43f5e" opacity="0.07" filter="url(#blur3)" />
  <circle cx="600" cy="80" r="180" fill="#7c3aed" opacity="0.06" filter="url(#blur3)" />
  <circle cx="400" cy="300" r="150" fill="#4ec9b0" opacity="0.05" filter="url(#blur1)" />
  <ellipse cx="750" cy="580" rx="300" ry="120" fill="#7c3aed" opacity="0.06" filter="url(#blur3)" />

  <!-- Subtle noise overlay -->
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.4" />

  <!-- Subtle top border accent -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#logoGrad)" opacity="0.6" />

  <!-- Code bracket logo icon </> -->
  <g transform="translate(600, 220)" text-anchor="middle">
    <!-- Bracket background glow -->
    <circle cx="0" cy="0" r="64" fill="#7c3aed" opacity="0.12" filter="url(#blur2)" />

    <!-- Bracket container -->
    <rect x="-58" y="-42" width="116" height="84" rx="16" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.5" />

    <!-- < symbol -->
    <text x="-28" y="14" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="300" fill="#4ec9b0" text-anchor="middle" opacity="0.95">&lt;</text>

    <!-- / symbol -->
    <text x="0" y="14" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="300" fill="#ededef" text-anchor="middle" opacity="0.7">/</text>

    <!-- > symbol -->
    <text x="28" y="14" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="300" fill="#7c3aed" text-anchor="middle" opacity="0.95">&gt;</text>
  </g>

  <!-- Main title: Vibing with Code -->
  <text x="600" y="340" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="-1.5">Vibing with Code</text>

  <!-- Subtitle -->
  <text x="600" y="395" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8a8f98" text-anchor="middle" letter-spacing="0.5">Free tools for word games and board games</text>

  <!-- Thin divider line -->
  <line x1="520" y1="430" x2="680" y2="430" stroke="#7c3aed" stroke-width="1" opacity="0.4" />

  <!-- Site URL -->
  <text x="600" y="470" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#4ec9b0" text-anchor="middle" letter-spacing="2" opacity="0.7">tylervibes.com</text>

  <!-- Bottom subtle border -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#logoGrad)" opacity="0.3" />
</svg>