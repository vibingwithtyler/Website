<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Vibing with Code</title>
    <meta name="description" content="Blog posts about building web tools, game solvers, and side projects. Thoughts on coding, puzzles, and things I'm learning.">
    <link rel="canonical" href="https://tylervibes.com/blog/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Blog | Vibing with Code">
    <meta property="og:description" content="Blog posts about building web tools, game solvers, and side projects.">
    <meta property="og:url" content="https://tylervibes.com/blog/">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050506;
            --bg-base: #0a0a0f;
            --bg-elevated: #111118;
            --bg-card: #14141e;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(124, 58, 237, 0.4);
            --text-primary: #ededef;
            --text-secondary: #8a8f98;
            --text-muted: #555963;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 58, 237, 0.15);
            --teal: #4ec9b0;
            --teal-glow: rgba(78, 201, 176, 0.12);
            --rose: #f43f5e;
            --radius: 16px;
            --radius-sm: 8px;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background blobs */
        .ambient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.07;
            animation: float 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: var(--accent);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--teal);
            bottom: -150px;
            left: -100px;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: var(--rose);
            top: 40%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        /* Navigation */
        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 16px 28px;
            background: rgba(5, 5, 6, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .nav-brand:hover { opacity: 0.7; }

        .nav-brand svg {
            width: 20px;
            height: 20px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text-primary); }

        /* Main content */
        .main {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 24px 60px;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 0 48px;
            animation: fadeIn 0.8s var(--ease-out) both;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.05;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.6;
        }

        /* Post list */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.35s var(--ease-out);
            position: relative;
            overflow: hidden;
            animation: cardIn 0.5s var(--ease-out) both;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--accent-glow), transparent 40%);
            opacity: 0;
            transition: opacity 0.35s var(--ease-out);
            pointer-events: none;
        }

        .post-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(124, 58, 237, 0.08), 0 0 0 1px rgba(124, 58, 237, 0.1);
        }

        .post-card:hover::before {
            opacity: 1;
        }

        .post-card:nth-child(1) { animation-delay: 0.15s; }
        .post-card:nth-child(2) { animation-delay: 0.25s; }
        .post-card:nth-child(3) { animation-delay: 0.35s; }
        .post-card:nth-child(4) { animation-delay: 0.45s; }
        .post-card:nth-child(5) { animation-delay: 0.55s; }

        .post-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .post-card-title {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .post-preview {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.9rem;
        }

        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            color: var(--accent-light);
            font-size: 0.85rem;
            font-weight: 500;
            transition: gap 0.2s var(--ease-out);
        }

        .post-card:hover .read-more {
            gap: 10px;
        }

        .read-more svg {
            width: 14px;
            height: 14px;
        }

        /* Single post view */
        .post-view {
            display: none;
            animation: fadeIn 0.6s var(--ease-out) both;
        }

        .post-view.active {
            display: block;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-light);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 36px;
            cursor: pointer;
            transition: opacity 0.2s, gap 0.2s;
        }

        .back-link:hover { opacity: 0.7; gap: 4px; }

        .back-link svg {
            width: 14px;
            height: 14px;
        }

        .post-meta {
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        /* Post content typography */
        .post-content {
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .post-content h1 {
            font-size: 2.2rem;
            -webkit-text-fill-color: var(--text-primary);
            margin-bottom: 16px;
            background: none;
        }

        .post-content h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-top: 40px;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .post-content h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-top: 32px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .post-content p {
            margin-bottom: 18px;
            color: var(--text-secondary);
        }

        .post-content a {
            color: var(--accent-light);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: rgba(167, 139, 250, 0.3);
            transition: text-decoration-color 0.2s;
        }

        .post-content a:hover {
            text-decoration-color: var(--accent-light);
        }

        .post-content ul, .post-content ol {
            margin-bottom: 18px;
            padding-left: 24px;
        }

        .post-content li {
            margin-bottom: 8px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .post-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .post-content em {
            color: var(--text-secondary);
            font-style: italic;
        }

        .post-content code {
            background: var(--bg-elevated);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.88em;
            color: var(--accent-light);
            border: 1px solid var(--border);
        }

        .post-content pre {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 18px;
        }

        .post-content pre code {
            background: none;
            padding: 0;
            border: none;
            font-size: 0.88rem;
        }

        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 18px;
            color: var(--text-muted);
            font-style: italic;
        }

        .post-content img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            margin: 20px 0;
        }

        .post-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }

        /* Loading / error states */
        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        .error {
            text-align: center;
            color: var(--rose);
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            font-size: 0.82rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.2s;
        }

        .social-links a:hover { color: var(--text-primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .ambient .blob { animation: none; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.4rem; }
            .hero { padding: 40px 0 36px; }
            .main { padding: 100px 16px 40px; }
            .post-card { padding: 22px; }
            .post-card-title { font-size: 1.1rem; }
            .post-content { font-size: 1rem; }
            .nav-brand span { display: none; }
        }
    </style>
</head>
<body>
    <!-- Ambient background -->
    <div class="ambient" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="site-nav" role="navigation" aria-label="Main navigation">
        <a href="/index.html" class="nav-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect width="32" height="32" rx="8" fill="currentColor" opacity="0.12"/>
                <path d="M12 10L7 16L12 22M20 10L25 16L20 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Vibing with Code</span>
        </a>
        <div class="nav-links">
            <a href="/blog/">Blog</a>
            <a href="https://github.com/vibingwithtyler" target="_blank" rel="noopener">GitHub</a>
        </div>
    </nav>

    <main class="main">
        <!-- Hero -->
        <div class="hero">
            <h1>Blog</h1>
            <p class="tagline">Thoughts, projects, and things I'm learning</p>
        </div>

        <div id="postList" class="post-list">
            <div class="loading">Loading posts...</div>
        </div>

        <div id="postView" class="post-view">
            <a class="back-link" onclick="showList()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
                Back to all posts
            </a>
            <div class="post-meta" id="postMeta"></div>
            <div class="post-content" id="postContent"></div>
        </div>

        <footer>
            <p>&copy; 2026 Tyler | Vibing with Code</p>
            <div class="social-links">
                <a href="https://github.com/vibingwithtyler" target="_blank" rel="noopener">GitHub</a>
            </div>
        </footer>
    </main>

    <script>
        const GITHUB_USER = 'vibingwithtyler';
        const GITHUB_REPO = 'Website';
        const POSTS_PATH = 'blog/posts';
        const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_PATH}`;

        let posts = [];

        function parseFilename(filename) {
            const match = filename.match(/^(\d{4}-\d{2}-\d{2})-(.+)\.md$/);
            if (!match) return null;
            return {
                date: match[1],
                slug: match[2],
                filename: filename
            };
        }

        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadPosts() {
            const listEl = document.getElementById('postList');

            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error(`GitHub API returned ${response.status}`);

                const files = await response.json();
                posts = files
                    .map(f => ({ ...parseFilename(f.name), download_url: f.download_url, path: f.path }))
                    .filter(p => p !== null && p.date !== undefined);

                // Fetch actual commit dates from GitHub for accurate ordering
                const COMMITS_API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits`;
                await Promise.all(posts.map(async (post) => {
                    try {
                        const res = await fetch(`${COMMITS_API}?path=${post.path}&per_page=1`);
                        if (res.ok) {
                            const commits = await res.json();
                            if (commits.length > 0) {
                                post.committedAt = commits[0].commit.committer.date;
                            }
                        }
                    } catch {}
                    if (!post.committedAt) post.committedAt = post.date;
                }));

                posts.sort((a, b) => b.committedAt.localeCompare(a.committedAt));

                if (posts.length === 0) {
                    listEl.innerHTML = '<div class="loading">No posts yet. Check back soon!</div>';
                    return;
                }

                // Fetch first ~200 chars of each post for preview
                const previews = await Promise.all(posts.map(async (post) => {
                    try {
                        const res = await fetch(post.download_url);
                        const text = await res.text();
                        const stripped = text.replace(/^#.*\n+/, '').trim();
                        const firstPara = stripped.split('\n\n')[0].replace(/[#*_\[\]()]/g, '');
                        return firstPara.slice(0, 180) + (firstPara.length > 180 ? '...' : '');
                    } catch {
                        return '';
                    }
                }));

                listEl.innerHTML = posts.map((post, i) => {
                    const title = post.slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    return `
                        <div class="post-card" onclick="showPost('${post.slug}')">
                            <div class="post-date">${formatDate(post.date)}</div>
                            <div class="post-card-title">${title}</div>
                            <div class="post-preview">${previews[i]}</div>
                            <div class="read-more">
                                Read more
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            </div>
                        </div>
                    `;
                }).join('');

                // Spotlight effect on post cards
                document.querySelectorAll('.post-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        card.style.setProperty('--mouse-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
                        card.style.setProperty('--mouse-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
                    });
                });

                // Check if URL has a post param
                const params = new URLSearchParams(window.location.search);
                const postSlug = params.get('post');
                if (postSlug) showPost(postSlug);

            } catch (err) {
                listEl.innerHTML = `<div class="error">Could not load posts. ${err.message}</div>`;
            }
        }

        async function showPost(slug) {
            const post = posts.find(p => p.slug === slug);
            if (!post) return;

            const listEl = document.getElementById('postList');
            const viewEl = document.getElementById('postView');
            const metaEl = document.getElementById('postMeta');
            const contentEl = document.getElementById('postContent');

            listEl.style.display = 'none';
            viewEl.classList.add('active');

            const title = post.slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            metaEl.textContent = formatDate(post.date);
            contentEl.innerHTML = '<div class="loading">Loading post...</div>';

            history.pushState(null, '', `?post=${slug}`);
            document.title = `${title} | Vibing with Code`;

            try {
                const res = await fetch(post.download_url);
                const markdown = await res.text();
                contentEl.innerHTML = marked.parse(markdown);
            } catch (err) {
                contentEl.innerHTML = `<div class="error">Could not load post. ${err.message}</div>`;
            }
        }

        function showList() {
            document.getElementById('postList').style.display = 'flex';
            document.getElementById('postView').classList.remove('active');
            history.pushState(null, '', '/blog/');
            document.title = 'Blog | Vibing with Code';
        }

        window.addEventListener('popstate', () => {
            const params = new URLSearchParams(window.location.search);
            const postSlug = params.get('post');
            if (postSlug) {
                showPost(postSlug);
            } else {
                showList();
            }
        });

        loadPosts();
    </script>
</body>
</html>
